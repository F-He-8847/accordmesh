name: Bug report
description: Report a reproducible AccordMesh defect
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Use fictional data. Never include credentials, real meeting content, vaults, databases, or media."
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: ["macOS", "Windows", "Linux", "Other"]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use the smallest safe reproduction with fictional data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety confirmation
      options:
        - label: I removed credentials, personal information, meeting content, media, vault files, and unredacted local paths.
          required: true
        - label: This is not a security vulnerability. Security reports follow SECURITY.md.
          required: true
