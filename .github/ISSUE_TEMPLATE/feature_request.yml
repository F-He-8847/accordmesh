name: Feature request
description: Propose a scoped improvement
title: "[Feature]: "
labels: ["enhancement", "needs-discussion"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: Describe the problem before proposing implementation details.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Privacy, security, provider, or platform impact
    validations:
      required: true
